<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nBeAI. GPAO-T</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="rail" aria-label="대화 탐색">
      <div class="brand"><span class="mark" aria-hidden="true">∞</span><strong>nBeAI. GPAO-T</strong></div>
      <button class="new-chat" id="new-chat" type="button">+ 새 대화</button>
      <nav id="sessions" aria-label="대화 목록"></nav>
      <div class="runtime-state" id="runtime-state">연결 상태 확인 중</div>
    </aside>
    <main class="conversation">
      <header class="topbar"><div><span class="eyebrow">작업 공간</span><h1 id="chat-title">새 대화</h1></div><div class="top-actions"><button id="models" type="button">AI 연결</button><button id="status" type="button" aria-label="런타임 상태">상태</button></div></header>
      <section class="messages" id="messages" aria-live="polite">
        <div class="welcome"><span class="mark" aria-hidden="true">∞</span><h2>무엇을 함께 해볼까요?</h2><p>대화를 시작하면 이 대화 안에서 필요한 맥락과 실행 흐름을 안전하게 정리합니다.</p></div>
      </section>
      <form class="composer" id="composer">
        <label class="sr-only" for="message">GPAO-T에 메시지 입력</label>
        <textarea id="message" rows="1" placeholder="GPAO-T에 메시지 입력" required></textarea>
        <button type="submit" id="send">보내기</button>
      </form>
      <p class="quiet-status" id="turn-status"></p>
    </main>
  </div>
  <dialog class="connection-dialog" id="connection-dialog" aria-labelledby="connection-title">
    <header class="dialog-header"><div><span class="eyebrow">GPAO-T 모델 연결</span><h2 id="connection-title">내 AI 연결</h2></div><button class="icon-button" id="close-connections" type="button" aria-label="닫기">×</button></header>
    <p class="dialog-intro">연결 상태를 확인하고, 이 기기에서 사용할 모델과 도구를 관리합니다.</p>
    <section class="default-model" aria-labelledby="default-model-title"><label id="default-model-title" for="default-model">기본 모델</label><select id="default-model"></select><button id="save-default-model" type="button">기본으로 사용</button><p id="model-selection-status" class="form-status" aria-live="polite"></p></section>
    <section id="provider-list" class="provider-list" aria-label="AI 연결 목록"></section>
    <section class="tool-connections" aria-labelledby="tool-connections-title">
      <div class="section-heading"><div><span class="eyebrow">연결 관리</span><h3 id="tool-connections-title">AI 및 도구 연결</h3></div><p>이 기기에서 사용할 도구를 선택합니다.</p></div>
      <p id="connector-status" class="form-status" aria-live="polite"></p>
      <div id="connector-list" class="connector-list" aria-label="AI 및 도구 연결 목록"></div>
    </section>
  </dialog>
  <script type="module" src="/app.js"></script>
</body>
</html>
